apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali
  namespace: istio-system
spec:
  auth:
    strategy: openshift
  deployment:
    accessible_namespaces:
      - bookinfo
  external_services:
    istio:
      root_namespace: istio-system
    tracing:
      enabled: true
      provider: tempo
      use_grpc: false
      in_cluster_url: https://tempo-tempo-gateway.tracing:8080/api/traces/v1/dev/tempo
      disable_version_check: true
      auth:
        type: bearer
        use_kiali_token: true
        insecure_skip_verify: true
      tempo_config:
        url_format: openshift
        org_id: dev
        cache_enabled: true
        cache_capacity: 200
      query_timeout: 30
    prometheus:
      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
      disable_version_check: true
      auth:
        type: bearer
        use_kiali_token: true
        insecure_skip_verify: false
      thanos_proxy:
        enabled: true
    grafana:
      enabled: false
