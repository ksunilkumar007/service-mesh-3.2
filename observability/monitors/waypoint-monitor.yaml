# =============================================================================
# Waypoint PodMonitor — L7 Envoy metrics
# =============================================================================
# Waypoint exposes two metrics ports:
#   15020  metrics       (Istio agent stats)
#   15090  http-envoy-prom  (Envoy proxy stats — L7 request metrics)
#
# We use PodMonitor (not ServiceMonitor) because the Waypoint Service
# only exposes 15008 (HBONE) and 15021 (health) — not the metrics ports.
#
# METRICS FROM 15090 (Envoy) INCLUDE:
#   envoy_http_downstream_rq_total          total requests through Waypoint
#   envoy_http_downstream_rq_time          request latency histogram
#   envoy_cluster_upstream_rq_*            upstream request stats per service
#   envoy_http_downstream_cx_active        active connections
#
# METRICS FROM 15020 (Istio agent) INCLUDE:
#   istio_requests_total                   request count with labels
#   istio_request_duration_milliseconds    latency histogram
#   istio_tcp_connections_*                TCP connection metrics
# =============================================================================
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: waypoint-monitor
  namespace: bookinfo
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: waypoint
  podMetricsEndpoints:
  - port: http-envoy-prom
    interval: 30s
    path: /stats/prometheus
  - port: metrics
    interval: 30s
    path: /metrics
