# =============================================================================
# RBAC — otel-collector ServiceAccount access to Tempo dev tenant
# =============================================================================
# PURPOSE:
#   Grants the otel-collector SA permission to write traces to the Tempo
#   gateway in openshift mode. The gateway uses OCP SubjectAccessReview
#   to check if the SA can access the tenant resource.
#
# WHY NEEDED:
#   TempoStack with mode: openshift uses OCP OAuth for authentication.
#   The OTEL collector sends its SA bearer token to the Tempo gateway.
#   Without this ClusterRole/Binding the gateway returns:
#     "rpc error: code = PermissionDenied desc = forbidden"
#
# READER BINDING:
#   Grants all authenticated users read access to the dev tenant.
#   Allows any logged-in OCP user to query traces via the Tempo UI.
#   Restrict to specific groups/users in production.
#
# APPLY ORDER:
#   Apply BEFORE starting the otel-collector or it will get permission
#   denied on first connection attempt.
# =============================================================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-write
rules:
- apiGroups:
  - 'tempo.grafana.com'
  resources:
  - dev
  resourceNames:
  - traces
  verbs:
  - 'create'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempostack-traces-write
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-write
subjects:
- kind: ServiceAccount
  name: otel-collector
  namespace: tracing
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempostack-traces-reader
rules:
- apiGroups:
  - 'tempo.grafana.com'
  resources:
  - dev
  resourceNames:
  - traces
  verbs:
  - 'get'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempostack-traces-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempostack-traces-reader
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: system:authenticated
